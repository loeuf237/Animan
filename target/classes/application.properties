# ===========================================
# Animan v2.0 - Configuration
# ===========================================

server.port=8080

# --- Sources anime ---
animan.base-url=https://w16.french-manga.net
animan.voir-anime-url=https://voir-anime.to
animan.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36

# --- Téléchargement ---
animan.download-dir=${user.home}/Downloads/Animan
animan.max-concurrent-downloads=3
animan.connection-timeout=15000
animan.read-timeout=30000

# --- Watchdog (auto-download favoris) ---
# Vérification toutes les heures
animan.watchdog-interval-ms=3600000

# --- Base de données H2 (persistance) ---
spring.datasource.url=jdbc:h2:file:${user.home}/.animan/db/animan;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Logging ---
logging.level.com.pauldev.animan=DEBUG
logging.level.org.springframework.web=INFO
