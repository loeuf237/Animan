<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('F1');
    if (form) {
        form.submit();
    }
    
    if (window.opener && window.name.startsWith('bulk_download_')) {
        setTimeout(function() {
            const downloadLink = document.querySelector('a.main-button[href*=".mp4"]');
            if (downloadLink) {
                try {
                    window.opener.postMessage({
                        type: 'download_link_ready',
                        link: downloadLink.href,
                        windowName: window.name
                    }, '*');
                } catch (e) {
                    console.error('Erreur postMessage:', e);
                }
            }
        }, 1000);
    }
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const errorMsg = document.querySelector('.err');
    
    if (errorMsg && errorMsg.textContent.trim()) {
        const currentUrl = window.location.href;
        
        if (currentUrl.includes('/d/') && currentUrl.includes('_n.html')) {
            const newUrl = currentUrl.replace('_n.html', '_o.html');
            window.location.href = newUrl;
        }
    } else {
        const isBulkDownload = window.opener && window.name.startsWith('bulk_download_');
        
        if (isBulkDownload) {
            setTimeout(function() {
                const downloadButton = document.querySelector('button.main-button');
                if (downloadButton) {
                    console.log('🔘 Clic automatique sur le bouton Download');
                    downloadButton.click();
                }
            }, 1000);
        } else {
            const urlParams = new URLSearchParams(window.location.search);
            const bulkIds = urlParams.get('bulk_ids');
            
            if (bulkIds && bulkIds.includes(',')) {
                const episodeData = urlParams.get('episode_data');
                handleBulkDownload(bulkIds, episodeData);
            } else {
                const form = document.getElementById('F1');
                if (form) {
                    form.submit();
                }
            }
        }
    }
});

function handleBulkDownload(idsString, episodeDataString) {
    const videoIds = idsString.split(',').filter(id => id.trim() !== '');
    
    let episodeMap = new Map();
    if (episodeDataString) {
        try {
            const decoded = JSON.parse(decodeURIComponent(episodeDataString));
            episodeMap = new Map(decoded);
        } catch (e) {
            console.error('Erreur parsing episode data:', e);
        }
    }
    
    if (videoIds.length < 2) {
        return;
    }
    
    const mainContent = document.querySelector('.file-details');
    if (!mainContent) {
        return;
    }
    
    mainContent.innerHTML = '';
    
    const bulkContainer = document.createElement('div');
    bulkContainer.className = 'bulk-download-container';
    bulkContainer.style.cssText = `
        max-width: 900px;
        margin: 30px auto;
        padding: 30px;
        background: rgba(25, 25, 37, 0.7);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    `;
    
    const title = document.createElement('h2');
    title.style.cssText = `
        font-family: 'Montserrat', sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #e2e2e2;
        text-align: center;
        margin-bottom: 30px;
    `;
    title.innerHTML = `<i class="fa fa-download"></i> Téléchargement Multiple`;
    bulkContainer.appendChild(title);
    
    const infoBox = document.createElement('div');
    infoBox.style.cssText = `
        background: rgba(108, 92, 231, 0.2);
        border-left: 4px solid #6c5ce7;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 4px;
        color: #e2e2e2;
    `;
    infoBox.innerHTML = `
        <strong><i class="fa fa-info-circle"></i> ${videoIds.length} épisodes sélectionnés</strong><br>
        <small>Cliquez sur "Lancer le téléchargement des épisodes" pour démarrer.</small>
    `;
    bulkContainer.appendChild(infoBox);
    
    const episodeList = document.createElement('div');
    episodeList.className = 'episode-list';
    episodeList.style.cssText = `
        max-height: 400px;
        overflow-y: auto;
        margin-bottom: 20px;
        background: rgba(15, 15, 26, 0.5);
        border-radius: 8px;
        padding: 15px;
    `;
    
    videoIds.forEach((videoId, index) => {
        const episodeName = episodeMap.get(videoId) || `Épisode ${index + 1}`;
        
        const episodeItem = document.createElement('div');
        episodeItem.className = 'episode-item';
        episodeItem.setAttribute('data-video-id', videoId);
        episodeItem.style.cssText = `
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(25, 25, 37, 0.8);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        `;
        
        episodeItem.innerHTML = `
            <div style="display: flex; align-items: center; flex: 1;">
                <span style="
                    background: linear-gradient(135deg, #6c5ce7, #fd79a8);
                    color: white;
                    padding: 5px 12px;

                statusContainer.innerHTML = `

        progressFill.style.width = percentage + '%';

function getDirectLinkViaPopup(videoId) {
    return new Promise((resolve, reject) => {
        const urls = [
            `https://vidzy.org/d/${videoId}_n.html`,
            `https://vidzy.org/d/${videoId}_o.html`,
            `https://vidzy.org/d/${videoId}.html`
        ];
        
        let currentIndex = 0;
        let popup = null;
        
        const messageHandler = function(event) {
            if (event.data && event.data.type === 'download_link_ready') {
                const windowId = event.data.windowName;
                if (windowId.includes(videoId)) {
                    window.removeEventListener('message', messageHandler);
                    if (popup) {
                        popup.close();
                    }
                    resolve(event.data.link);
                }
            }
        };
        
        window.addEventListener('message', messageHandler);
        
        function tryNextUrl() {
            if (currentIndex >= urls.length) {
                window.removeEventListener('message', messageHandler);
                if (popup) {
                    popup.close();
                }
                reject(new Error('Toutes les URLs ont échoué'));
                return;
            }
            
            const url = urls[currentIndex];
            console.log(`📡 Tentative ${currentIndex + 1}: ${url}`);
            
            popup = window.open(url, `bulk_download_${videoId}_${currentIndex}`, 'popup,width=10,height=10,left=10000,top=10000');
            
            if (!popup) {
                console.error('Popup bloquée');
                window.removeEventListener('message', messageHandler);
                reject(new Error('Popup bloquée par le navigateur'));
                return;
            }
            
            const timeout = setTimeout(() => {
                if (popup && !popup.closed) {
                    popup.close();
                }
                currentIndex++;
                tryNextUrl();
            }, 10000);
            
            const checkClosed = setInterval(() => {
                if (popup && popup.closed) {
                    clearInterval(checkClosed);
                    clearTimeout(timeout);
                }
            }, 500);
        }
        
        tryNextUrl();
    });
}
