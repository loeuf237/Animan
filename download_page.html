   /* Reset et styles de base */
   * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
   }
   
   html, body {
      height: 100%;
      min-height: 100%;
   }
   
   body {
      background-color: var(--dark);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
   }
   
   a {
      color: var(--accent);

   a:hover {
      color: var(--secondary);

   .logo-vidzy {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--text);
      text-transform: uppercase;
      position: relative;
      display: flex;
      align-items: center;
   }
   
   .logo-vidzy::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -20px;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 8px;
      transform: rotate(45deg);
      z-index: -1;
   }
   
   .logo-vidzy::after {
      content: '';
      position: absolute;
      bottom: -5px;
      right: -15px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 4px;
      transform: rotate(45deg);
      z-index: -1;
   }
   
   .logo-dot {
      color: var(--secondary);
   }
   
   .container {

      margin: 0 auto;
      position: relative;

   .navbar-inner {
      background-color: rgba(15, 15, 26, 0.95);

      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      transition: var(--transition);

   .navbar-inner.scrolled {

      margin-left: 10px;

   .qlink:hover {

   .dropbtn {

   .dropbtn:hover {

   .dropdown-content {
      display: none;
      position: absolute;
      background-color: var(--light-dark);
      min-width: 160px;
      box-shadow: var(--box-shadow);
      border-radius: var(--border-radius);
      overflow: hidden;
      z-index: 1000;
   }
   
   .dropdown-content a {
      color: var(--text);
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
      transition: var(--transition);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
   }
   
   .dropdown-content a:last-child {
      border-bottom: none;
   }
   
   .dropdown-content a:hover {
      background-color: var(--medium-dark);
      color: var(--accent);
   }
   
   .dropdown:hover .dropdown-content {
      display: block;
   }
   
   /* Mobile Menu */
   .open {
      font-size: 24px;

      border-radius: var(--border-radius);
      right: 20px;
      top: 20px;
      z-index: 1000;

   .open:hover {

    }
});

        console.log(`\n🔍 Traitement épisode ${i + 1}/${videoIds.length}: ${videoId}`);
        
        const episodeItem = document.querySelector(`.episode-item[data-video-id="${videoId}"]`);
        const statusContainer = episodeItem.querySelector('.episode-status');
        
        statusContainer.innerHTML = `
            <i class="fa fa-spinner fa-spin" style="color: #6c5ce7; margin-right: 5px;"></i>
            <span style="color: #6c5ce7; font-size: 0.9rem;">Récupération...</span>
        `;
        
        try {
            const link = await getDirectLinkViaPopup(videoId);
            
            if (link) {
                directLinks.push(link);
                console.log(`✅ Lien trouvé: ${link}`);
                
                statusContainer.innerHTML = `
                    <i class="fa fa-check-circle" style="color: #2ed573; margin-right: 5px;"></i>
                    <span style="color: #2ed573; font-size: 0.9rem;">Prêt</span>
                `;
                episodeItem.style.background = 'rgba(46, 213, 115, 0.1)';
            } else {
                throw new Error('Lien non trouvé');
            }
        } catch (error) {
            console.error(`❌ Erreur pour ${videoId}:`, error);
            
            if (error.message === 'Popup bloquée par le navigateur') {
                alert('❌ Les popups sont bloquées !\n\nVeuillez autoriser les popups pour ce site puis relancer le téléchargement.');
                button.innerHTML = '<i class="fa fa-times"></i> Popups bloquées - Réessayez';
                button.style.background = 'linear-gradient(to right, #ff4757, #ff6348)';
                button.disabled = false;
                return;
            }
            
            statusContainer.innerHTML = `
                <i class="fa fa-times-circle" style="color: #ff4757; margin-right: 5px;"></i>
                <span style="color: #ff4757; font-size: 0.9rem;">Erreur</span>
            `;
            episodeItem.style.background = 'rgba(255, 71, 87, 0.1)';
        }
        
        const percentage = Math.round(((i + 1) / videoIds.length) * 100);
        progressFill.style.width = percentage + '%';
        progressText.textContent = percentage + '%';
        
        await new Promise(resolve => setTimeout(resolve, 1500));
    }
    
    console.log('\n📊 Résumé:', directLinks.length, '/', videoIds.length, 'liens récupérés');
    
    if (directLinks.length === 0) {
        button.innerHTML = '<i class="fa fa-times"></i> Échec - Aucun lien trouvé';
        button.style.background = 'linear-gradient(to right, #ff4757, #ff6348)';
        return;
    }
    
    button.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Lancement des téléchargements...';
    
    directLinks.forEach((link, index) => {
        setTimeout(() => {
            window.open(link, '_blank');
            console.log(`📥 Téléchargement lancé ${index + 1}/${directLinks.length}`);
        }, index * 800);
    });
    
    setTimeout(() => {
        button.innerHTML = `<i class="fa fa-check"></i> ${directLinks.length} téléchargements lancés !`;
        button.style.background = 'linear-gradient(to right, #2ed573, #26d0ce)';
        button.disabled = false;
    }, directLinks.length * 800);
}

function getDirectLinkViaPopup(videoId) {
    return new Promise((resolve, reject) => {
        const urls = [
            `https://vidzy.org/d/${videoId}_n.html`,
            `https://vidzy.org/d/${videoId}_o.html`,
            `https://vidzy.org/d/${videoId}.html`
        ];
        
        let currentIndex = 0;
        let popup = null;
        
        const messageHandler = function(event) {
            if (event.data && event.data.type === 'download_link_ready') {
                const windowId = event.data.windowName;
                if (windowId.includes(videoId)) {
                    window.removeEventListener('message', messageHandler);
                    if (popup) {
                        popup.close();
                    }
                    resolve(event.data.link);
                }
            }
        };
        
        window.addEventListener('message', messageHandler);
        
        function tryNextUrl() {
            if (currentIndex >= urls.length) {
                window.removeEventListener('message', messageHandler);
                if (popup) {
                    popup.close();
                }
                reject(new Error('Toutes les URLs ont échoué'));
                return;
            }
            
            const url = urls[currentIndex];
            console.log(`📡 Tentative ${currentIndex + 1}: ${url}`);
            
            popup = window.open(url, `bulk_download_${videoId}_${currentIndex}`, 'popup,width=10,height=10,left=10000,top=10000');
            
            if (!popup) {
                console.error('Popup bloquée');
                window.removeEventListener('message', messageHandler);
                reject(new Error('Popup bloquée par le navigateur'));
                return;
            }
            
            const timeout = setTimeout(() => {
                if (popup && !popup.closed) {
                    popup.close();
                }
                currentIndex++;
                tryNextUrl();
            }, 10000);
            
            const checkClosed = setInterval(() => {
                if (popup && popup.closed) {
                    clearInterval(checkClosed);
                    clearTimeout(timeout);
                }
            }, 500);
        }
        
        tryNextUrl();
    });
}

<script>

document.addEventListener('DOMContentLoaded', function() {
     const dmcaLink = document.querySelector('a[href*="dmca.html"]');    
    if (dmcaLink) {
         dmcaLink.classList.add('elusive-dmca');
        
         let mouseX = 0;
        let mouseY = 0;
        
         let originalPosition = { left: 0, top: 0 };
        let currentPosition = { left: 0, top: 0 };
        let isHovering = false;
        
         dmcaLink.style.position = 'relative';
        dmcaLink.style.display = 'inline-block';
        dmcaLink.style.zIndex = '100';
        
         document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            checkProximity();
        });
        
         function checkProximity() {
            const rect = dmcaLink.getBoundingClientRect();
            const linkCenterX = rect.left + rect.width / 2;
            const linkCenterY = rect.top + rect.height / 2;
            
             const distanceX = mouseX - linkCenterX;
            const distanceY = mouseY - linkCenterY;
            const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
            
             if (distance < 100 && !isHovering) {
                moveLinkAway(distanceX, distanceY);
            }
        }
        
         function moveLinkAway(distanceX, distanceY) {
             const dirX = distanceX / Math.sqrt(distanceX * distanceX + distanceY * distanceY);
            const dirY = distanceY / Math.sqrt(distanceX * distanceX + distanceY * distanceY);
            
             const randomAngle = Math.random() * Math.PI * 1.5;  
            const fleeAngle = Math.atan2(-dirY, -dirX) + randomAngle - Math.PI * 0.75; 
            
             const minDistance = 30 + Math.random() * 40; 
            const moveX = Math.cos(fleeAngle) * minDistance;
            const moveY = Math.sin(fleeAngle) * minDistance;
            
             currentPosition.left += moveX;
            currentPosition.top += moveY;
            
             currentPosition.left = currentPosition.left * 0.8;
            currentPosition.top = currentPosition.top * 0.8;
            
             const rotation = (Math.random() - 0.5) * 10;  
            
             dmcaLink.style.transform = `translate(${currentPosition.left}px, ${currentPosition.top}px) rotate(${rotation}deg)`;
            dmcaLink.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';  
            
             dmcaLink.style.color = '#fd79a8';
            setTimeout(() => {
                dmcaLink.style.color = '';
            }, 300);
        }
        
         dmcaLink.addEventListener('mouseenter', function() {
            isHovering = true;
            
             const jumpDistance = 80 + Math.random() * 40;
            const jumpAngle = Math.random() * Math.PI * 2;  
            
            currentPosition.left = Math.cos(jumpAngle) * jumpDistance;
            currentPosition.top = Math.sin(jumpAngle) * jumpDistance;
            
            dmcaLink.style.transform = `translate(${currentPosition.left}px, ${currentPosition.top}px) scale(1.1)`;
            dmcaLink.style.transition = 'transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28)';  
            
             setTimeout(() => {
                isHovering = false;
            }, 300);
        });
        
         let attempts = 0;
        let timeStarted = null;
        
        dmcaLink.addEventListener('mouseleave', function() {
            if (!timeStarted) {
                timeStarted = new Date().getTime();
            }
            
            attempts++;
            isHovering = false;
            
             const currentTime = new Date().getTime();
            const timeElapsed = (currentTime - timeStarted) / 1000;  
            
            if (attempts >= 10 && timeElapsed > 20) {
                dmcaLink.classList.add('catchable');
                dmcaLink.style.transform = 'translate(0, 0) rotate(0deg)';
                dmcaLink.style.transition = 'all 0.5s ease';
                currentPosition = { left: 0, top: 0 };
                
                 dmcaLink.innerHTML = '<i class="fas fa-copyright"></i> DMCA (Caught!)';
                dmcaLink.style.backgroundColor = 'rgba(108, 92, 231, 0.2)';

                dmcaLink.style.color = '#fd79a8';
                dmcaLink.style.fontWeight = 'bold';
                
                 dmcaLink.style.pointerEvents = 'auto';
                dmcaLink.setAttribute('title', 'Félicitations pour votre persévérance!');
            }
        });
    }
});
