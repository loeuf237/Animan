<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' - AniDownload'">AniDownload</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%237c3aed'/%3E%3Cpath d='M61 18a33 33 0 1 0 18 51 24 24 0 1 1-18-51Z' fill='%230b1020'/%3E%3C/svg%3E"/>
</head>
<nav th:fragment="navbar" class="app-shell">
  <aside class="app-sidebar">
    <a href="/" class="brand-mark" aria-label="AniDownload">
      <span class="brand-icon">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <circle cx="24" cy="24" r="22" fill="currentColor" opacity=".95"/>
          <path d="M31 8a17 17 0 1 0 9 27 12.5 12.5 0 1 1-9-27Z" fill="#111827"/>
          <circle cx="31" cy="17" r="3" fill="#a78bfa"/>
        </svg>
      </span>
      <span class="brand-name">Ani<span>Download</span></span>
    </a>

    <div class="sidebar-menu">
      <a href="/" class="side-link" id="nav-home">
        <svg viewBox="0 0 24 24"><path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
        <span>Accueil</span>
      </a>
      <a href="/#search-panel" class="side-link" id="nav-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
        <span>Rechercher</span>
      </a>
      <a href="/downloads" class="side-link" id="nav-downloads">
        <svg viewBox="0 0 24 24"><path d="M12 3v11"/><path d="m7 10 5 5 5-5"/><path d="M5 20h14"/></svg>
        <span>Telechargements</span>
        <span class="side-badge" id="download-count-badge">0</span>
      </a>
      <a href="/library" class="side-link" id="nav-library">
        <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 5V3h8v2"/><path d="M8 11h8"/></svg>
        <span>Bibliotheque</span>
      </a>
      <a href="/history" class="side-link" id="nav-history">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l4 2"/></svg>
        <span>Historique</span>
      </a>
      <button class="side-link side-button" id="settings-shortcut" type="button">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.8-1L14.4 3H9.6L9.2 6.1a7 7 0 0 0-1.8 1L5 6.1l-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.8 1l.4 3.1h4.8l.4-3.1a7 7 0 0 0 1.8-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z"/></svg>
        <span>Parametres</span>
      </button>
    </div>

    <div class="storage-card">
      <div class="storage-head">
        <span>Stockage</span>
        <strong>32%</strong>
      </div>
      <div class="storage-bar"><span style="width:32%"></span></div>
      <p>325 Go / 1 To</p>
    </div>
  </aside>

  <header class="app-topbar">
    <form class="top-search" action="/search" method="get">
      <input type="hidden" name="source" value="french-manga"/>
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
      <input type="text" name="q" placeholder="Rechercher un anime..." autocomplete="off"/>
    </form>
    <div class="top-actions">
      <button class="icon-button" id="theme-toggle" type="button" title="Changer le theme">
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 13a8 8 0 1 1-10-10 7 7 0 0 0 10 10Z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>
      </button>
      <button class="icon-button" type="button" title="Parametres" data-toggle-download-settings>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.8-1L14.4 3H9.6L9.2 6.1a7 7 0 0 0-1.8 1L5 6.1l-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.8 1l.4 3.1h4.8l.4-3.1a7 7 0 0 0 1.8-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z"/></svg>
      </button>
      <span class="window-dot"></span>
      <span class="window-line"></span>
      <span class="window-square"></span>
      <span class="window-close"></span>
    </div>
  </header>
</nav>
</html>
