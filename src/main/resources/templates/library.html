<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('Ma Liste')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="main-content">

  <div class="page-header fade-in">
    <h1 class="page-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Ma Liste
    </h1>
    <p class="page-sub">Vos animés favoris &amp; suivi de progression</p>
  </div>

  <!-- Favoris vides -->
  <div th:if="${favorites == null or favorites.isEmpty()}" class="empty-state fade-in">
    <div class="empty-icon">❤️</div>
    <h3>Votre liste est vide</h3>
    <p>Ajoutez des animés à votre liste depuis la page de détail.</p>
    <a href="/" class="btn btn-primary">Rechercher des animés</a>
  </div>

  <!-- Grille favoris -->
  <div th:unless="${favorites == null or favorites.isEmpty()}" class="section fade-in">
    <div class="results-grid">
      <div th:each="fav : ${favorites}" class="anime-card fade-in">
        <a th:href="'/anime?url=' + ${fav.url} + '&source=' + ${fav.source != null ? fav.source : 'french-manga'}" class="card-link">
          <div class="card-poster">
            <img th:if="${fav.imageUrl != null and !fav.imageUrl.isEmpty()}"
                 th:src="${fav.imageUrl}" th:alt="${fav.title}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>
            <div class="card-poster-placeholder">🎬</div>
            <div class="card-overlay">
              <span class="fav-badge">❤️</span>
              <span th:if="${fav.autoDownload}" class="chip chip-auto" style="font-size:0.65rem;padding:2px 6px;">Auto-DL</span>
            </div>
          </div>
          <div class="card-info">
            <h3 class="card-title" th:text="${fav.title}">Titre</h3>
            <span class="card-sub" th:text="${fav.source != null ? fav.source : 'french-manga'}">source</span>
          </div>
        </a>
        <!-- Actions rapides -->
        <div class="card-quick-actions">
          <label class="auto-dl-label" th:title="'Auto-download pour ' + ${fav.title}">
            <input type="checkbox" class="auto-dl-checkbox"
                   th:data-url="${fav.url}"
                   th:checked="${fav.autoDownload}"
                   onchange="toggleAutoDownloadFromLibrary(this)"/>
            <span>Auto-DL</span>
          </label>
          <button class="btn btn-sm btn-danger"
                  th:data-url="${fav.url}"
                  onclick="removeFavorite(this)" title="Retirer des favoris">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 14.142A2 2 0 0 1 16.138 22H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Historique récent -->
  <div th:if="${history != null and !history.isEmpty()}" class="section fade-in">
    <h2 class="section-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Téléchargements récents
    </h2>
    <div class="history-list">
      <div th:each="task : ${history}" class="history-item"
           th:classappend="${task.status.name() == 'COMPLETED'} ? ' status-completed' : (${task.status.name() == 'FAILED'} ? ' status-failed' : ' status-other')">
        <div class="history-info">
          <span class="history-anime" th:text="${task.animeName}">Anime</span>
          <span class="history-ep" th:text="'Épisode ' + ${task.episodeNumber}">Ep 1</span>
          <span class="history-file" th:text="${task.fileName}">file.mp4</span>
        </div>
        <div class="history-meta">
          <span class="status-badge"
                th:classappend="${task.status.name() == 'COMPLETED'} ? ' badge-ok' : ' badge-err'"
                th:text="${task.status}">STATUS</span>
          <span class="history-date"
                th:text="${task.completedAt != null ? #temporals.format(task.completedAt,'dd/MM/yyyy HH:mm') : #temporals.format(task.createdAt,'dd/MM/yyyy HH:mm')}">date</span>
        </div>
      </div>
    </div>
    <a href="/history" class="btn btn-sm" style="margin-top:1rem;">Voir tout l'historique</a>
  </div>

</div>
<div class="toast-container" id="toast-container"></div>
<script src="/js/app.js"></script>
<script>document.getElementById('nav-library')?.classList.add('active');</script>
</body>
</html>
