<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('Téléchargements')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="main-content">
  <div class="page-header fade-in">
    <h1 class="page-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Téléchargements
    </h1>
  </div>

  <!-- Barre de contrôle globale -->
  <div class="dl-controls fade-in">
    <div class="dl-controls-left">
      <button class="btn btn-sm" id="pause-all-btn">⏸ Tout mettre en pause</button>
      <button class="btn btn-sm btn-primary" id="resume-all-btn">▶ Tout reprendre</button>
      <button class="btn btn-sm" id="clean-btn">🧹 Nettoyer</button>
    </div>
    <div class="dl-controls-right">
      <button class="btn btn-sm" id="toggle-settings-btn" style="background: rgba(124,106,247,0.12); border-color: var(--accent); color: var(--accent);">⚙️ Paramètres</button>
    </div>
  </div>

  <!-- Panneau de Configuration (Premium Card, caché par défaut) -->
  <div class="settings-card fade-in" id="settings-panel" style="display: none; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem;">
    <h3 style="font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); display: flex; align-items: center; gap: 0.4rem;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Configuration de Téléchargement
    </h3>
    <div style="display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: flex-end;">
      
      <div class="settings-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
        <label for="max-concurrent-input" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">DL simultanés :</label>
        <input type="number" id="max-concurrent-input" class="input-premium" style="width: 80px;" min="1" max="20" value="3"/>
      </div>

      <div class="settings-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
        <label for="global-speed-input-settings" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Vitesse max (KB/s) :</label>
        <input type="number" id="global-speed-input-settings" class="input-premium" style="width: 110px;" placeholder="Illimitée" min="0"/>
      </div>

      <div class="settings-group" style="display: flex; flex-direction: column; gap: 0.4rem; min-width: 180px;">
        <label for="user-agent-select" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">User-Agent :</label>
        <select id="user-agent-select" class="input-premium" style="padding: 0.35rem 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text);">
          <option value="Random (Rotator)">Aléatoire (Rotator)</option>
          <option value="Chrome">Google Chrome (Windows)</option>
          <option value="Firefox">Mozilla Firefox (Windows)</option>
          <option value="Safari">Apple Safari (macOS)</option>
          <option value="Edge">Microsoft Edge (Windows)</option>
          <option value="Custom">Saisie personnalisée...</option>
        </select>
      </div>

      <div class="settings-group" id="custom-ua-group" style="display: none; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 250px;">
        <label for="custom-ua-input" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">User-Agent personnalisé :</label>
        <input type="text" id="custom-ua-input" class="input-premium" style="width: 100%; padding: 5px 8px;" placeholder="Mozilla/5.0..."/>
      </div>

      <div class="settings-group" style="display: flex; align-items: center; gap: 0.5rem; height: 32px;">
        <input type="checkbox" id="plex-org-cb" style="cursor: pointer; width: 15px; height: 15px;"/>
        <label for="plex-org-cb" style="font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; user-select: none;">Organisation Plex/Jellyfin</label>
      </div>

      <div class="settings-group" style="margin-left: auto;">
        <button class="btn btn-primary" id="save-settings-btn" style="padding: 0.45rem 1.2rem; font-weight: 600;">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Liste des téléchargements (peuplée via SSE + SSR) -->
  <div id="download-list" class="dl-list fade-in">

    <div th:each="task : ${tasks}"
         th:id="'task-' + ${task.id}"
         class="dl-task-row"
         th:data-id="${task.id}"
         th:data-status="${task.status.name()}">
      <div class="dl-task-header">
        <span class="dl-task-name"
              th:text="${task.animeName} + ' — Ép.' + ${task.episodeNumber} + ' ' + ${task.fileName}">
          Anime
        </span>
        <span class="dl-task-status status-badge"
              th:classappend="${task.status.name() == 'COMPLETED'} ? 'badge-ok' :
                               (${task.status.name() == 'FAILED'} ? 'badge-err' : 'badge-other')"
              th:text="${task.status}">STATUS</span>
      </div>

      <div class="dl-progress-wrap"
           th:style="${task.status.name() == 'DOWNLOADING' or task.progress > 0} ? 'display:flex' : 'display:none'">
        <div class="dl-progress-bar">
          <div class="dl-progress-fill" th:style="'width:' + ${task.progress} + '%'"></div>
        </div>
        <span class="dl-progress-text"
              th:text="${#numbers.formatDecimal(task.progress, 1, 1)} + '%'">0%</span>
      </div>

      <div class="dl-task-meta">
        <span class="dl-size"
              th:text="${task.formattedDownloadedSize} + ' / ' + ${task.formattedTotalSize}">0 B</span>
        <span class="dl-speed" th:text="${task.formattedSpeed}">0 B/s</span>
        <span class="dl-error" style="color:var(--danger);font-size:0.78rem;"
              th:text="${task.error}"></span>
      </div>

      <!-- Actions via data-* pour éviter th:onclick avec String (interdit par Thymeleaf 3.1+) -->
      <div class="dl-task-actions" th:data-id="${task.id}" th:data-status="${task.status.name()}" th:data-animename="${task.animeName}">
        <!-- Les boutons sont générés par JS via renderTaskActions() -->
      </div>
    </div>

    <div th:if="${tasks == null or tasks.isEmpty()}" class="empty-state" id="dl-empty">
      <div class="empty-icon">⬇️</div>
      <h3>Aucun téléchargement actif</h3>
      <p>Lancez des téléchargements depuis la page d'un animé.</p>
      <a href="/" class="btn btn-primary">Rechercher</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.getElementById('nav-downloads')?.classList.add('active');

// Initialiser les boutons d'action sur les lignes SSR
document.querySelectorAll('.dl-task-actions[data-id]').forEach(actEl => {
  const id = actEl.dataset.id;
  const status = actEl.dataset.status;
  const animeName = actEl.dataset.animename;
  actEl.innerHTML = renderTaskActions({ id, status, animeName });
});

// Contrôles globaux
document.getElementById('pause-all-btn').addEventListener('click', () =>
  fetch('/api/download/pause-all', { method: 'POST' }));
document.getElementById('resume-all-btn').addEventListener('click', () =>
  fetch('/api/download/resume-all', { method: 'POST' }));
document.getElementById('clean-btn').addEventListener('click', () =>
  fetch('/api/download/clean', { method: 'POST' }));

let currentSettings = { maxConcurrentDownloads: 3, globalSpeedLimit: 0, plexOrganization: false, selectedUserAgent: "Random (Rotator)" };

// Toggle panneau paramètres
const settingsPanel = document.getElementById('settings-panel');
const toggleSettingsBtn = document.getElementById('toggle-settings-btn');
if (toggleSettingsBtn && settingsPanel) {
  toggleSettingsBtn.addEventListener('click', () => {
    const isHidden = settingsPanel.style.display === 'none';
    settingsPanel.style.display = isHidden ? 'block' : 'none';
    toggleSettingsBtn.style.background = isHidden ? 'var(--accent)' : 'rgba(124,106,247,0.12)';
    toggleSettingsBtn.style.color = isHidden ? '#fff' : 'var(--accent)';
  });
}

// Gérer l'affichage de l'input custom UA
const uaSelect = document.getElementById('user-agent-select');
const customUaGroup = document.getElementById('custom-ua-group');
if (uaSelect && customUaGroup) {
  uaSelect.addEventListener('change', () => {
    customUaGroup.style.display = uaSelect.value === 'Custom' ? 'flex' : 'none';
  });
}

// Bouton de sauvegarde global
document.getElementById('save-settings-btn').addEventListener('click', async () => {
  const maxConcurrent = parseInt(document.getElementById('max-concurrent-input').value, 10) || 3;
  const globalSpeed = (parseInt(document.getElementById('global-speed-input-settings').value, 10) || 0) * 1024;
  const plexOrg = document.getElementById('plex-org-cb').checked;
  
  let uaValue = uaSelect.value;
  if (uaValue === 'Custom') {
    uaValue = document.getElementById('custom-ua-input').value.trim();
    if (!uaValue) {
      showToast('Veuillez saisir un User-Agent personnalisé', 'error');
      return;
    }
  }

  currentSettings.maxConcurrentDownloads = maxConcurrent;
  currentSettings.globalSpeedLimit = globalSpeed;
  currentSettings.plexOrganization = plexOrg;
  currentSettings.selectedUserAgent = uaValue;

  await saveSettingsToServer();
});

async function saveSettingsToServer() {
  try {
    const resp = await fetch('/api/download/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(currentSettings)
    });
    const data = await resp.json();
    if (data.success) {
      showToast('Paramètres mis à jour ✨', 'success');
      setTimeout(() => window.location.reload(), 800);
    } else {
      showToast(data.error || 'Erreur lors de la mise à jour', 'error');
    }
  } catch (err) {
    showToast('Erreur de connexion', 'error');
  }
}

// Charger les settings
fetch('/api/download/settings').then(r => r.json()).then(s => {
  currentSettings = s;
  document.getElementById('max-concurrent-input').value = s.maxConcurrentDownloads;
  document.getElementById('global-speed-input-settings').value = s.globalSpeedLimit > 0 ? Math.round(s.globalSpeedLimit / 1024) : '';
  document.getElementById('plex-org-cb').checked = !!s.plexOrganization;
  
  const uaSelect = document.getElementById('user-agent-select');
  const customUaInput = document.getElementById('custom-ua-input');
  const customUaGroup = document.getElementById('custom-ua-group');
  
  const standardUas = ['Random (Rotator)', 'Chrome', 'Firefox', 'Safari', 'Edge'];
  if (s.selectedUserAgent && standardUas.includes(s.selectedUserAgent)) {
    uaSelect.value = s.selectedUserAgent;
    customUaGroup.style.display = 'none';
  } else if (s.selectedUserAgent) {
    uaSelect.value = 'Custom';
    customUaInput.value = s.selectedUserAgent;
    customUaGroup.style.display = 'flex';
  }
}).catch(() => {});
</script>

<style>
.dl-controls {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.75rem; padding: 0.75rem 1rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 1rem;
}
.dl-controls-left, .dl-controls-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.dl-list { display: flex; flex-direction: column; gap: 0.5rem; }
.dl-task-row {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.85rem 1rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  transition: border var(--transition);
}
.dl-task-row:hover { border-color: var(--border-hover); }
.dl-task-row[data-status="COMPLETED"] { border-left: 3px solid var(--success); }
.dl-task-row[data-status="FAILED"]    { border-left: 3px solid var(--danger); }
.dl-task-header {
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
}
.dl-task-name {
  font-size: 0.88rem; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.dl-progress-wrap { display: flex; align-items: center; gap: 0.5rem; }
.dl-progress-bar {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
}
.dl-progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 99px; transition: width 0.4s ease;
}
.dl-progress-text { font-size: 0.75rem; color: var(--text-secondary); min-width: 40px; text-align: right; }
.dl-task-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
.dl-size, .dl-speed { font-size: 0.78rem; color: var(--text-muted); }
.dl-task-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
</style>
</body>
</html>
